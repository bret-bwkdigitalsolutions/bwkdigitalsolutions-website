name: Deploy to Cloudways

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git' --exclude='.github' --exclude='DEPLOYMENT-INSTRUCTIONS.md' --exclude='_templates'
          path: ./
          remote_path: ${{ secrets.CLOUDWAYS_APP_PATH }}
          remote_host: ${{ secrets.CLOUDWAYS_HOST }}
          remote_port: ${{ secrets.CLOUDWAYS_SSH_PORT }}
          remote_user: ${{ secrets.CLOUDWAYS_USER }}
          remote_key: ${{ secrets.CLOUDWAYS_SSH_KEY }}
